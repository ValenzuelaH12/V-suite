<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0f">
    <meta name="description" content="V-Suite - Plataforma integral de gestión operativa para hoteles">
    <title>V-Suite</title>
  </head>
  <body>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="background:white;color:red;font-size:24px;z-index:9999;position:absolute;top:0;left:0;padding:20px;">Error: ' + e.message + '<br>' + e.filename + ':' + e.lineno + '</div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="background:white;color:red;font-size:24px;z-index:9999;position:absolute;top:50%;left:0;padding:20px;">Promise Error: ' + (e.reason && e.reason.message ? e.reason.message : e.reason) + '</div>';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
